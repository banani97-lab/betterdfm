name: Deploy

on:
  push:
    branches: [main]

env:
  AWS_REGION: us-east-1
  ECR_REGISTRY: 578381014577.dkr.ecr.us-east-1.amazonaws.com
  ECS_CLUSTER: betterdfm
  ECS_SERVICE: betterdfm-worker
  APPRUNNER_SERVICE_ARN: arn:aws:apprunner:us-east-1:578381014577:service/betterdfm-api/ab309c6d7b0042e29f0cb6f9e34b8ce2

jobs:
  # Detect which services have changed so we only rebuild what's needed.
  changes:
    runs-on: ubuntu-latest
    outputs:
      worker: ${{ steps.filter.outputs.worker }}
      api: ${{ steps.filter.outputs.api }}
      gerbonara: ${{ steps.filter.outputs.gerbonara }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            worker:
              - 'workers/dfm-worker/**'
              - 'engine/dfm-engine/**'
              - 'sidecar/gerbonara/**'
            api:
              - 'apps/api/**'
              - 'engine/dfm-engine/**'
            gerbonara:
              - 'sidecar/gerbonara/**'

  # Single job that builds worker + gerbonara images and deploys them
  # together in one task definition revision. This prevents race conditions
  # where two parallel jobs overwrite each other's task definition updates.
  deploy-ecs:
    needs: changes
    if: needs.changes.outputs.worker == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push worker
        run: |
          docker build \
            -f workers/dfm-worker/Dockerfile \
            -t $ECR_REGISTRY/betterdfm-worker:latest \
            -t $ECR_REGISTRY/betterdfm-worker:${{ github.sha }} \
            .
          docker push $ECR_REGISTRY/betterdfm-worker:latest
          docker push $ECR_REGISTRY/betterdfm-worker:${{ github.sha }}

      - name: Build and push gerbonara
        if: needs.changes.outputs.gerbonara == 'true'
        working-directory: sidecar/gerbonara
        run: |
          docker build \
            -t $ECR_REGISTRY/betterdfm-gerbonara:latest \
            -t $ECR_REGISTRY/betterdfm-gerbonara:${{ github.sha }} \
            .
          docker push $ECR_REGISTRY/betterdfm-gerbonara:latest
          docker push $ECR_REGISTRY/betterdfm-gerbonara:${{ github.sha }}

      - name: Register new task definition with updated images
        id: task-def
        run: |
          TASK_DEF=$(aws ecs describe-task-definition --task-definition betterdfm-worker --region $AWS_REGION --query 'taskDefinition')

          # Always update worker image
          TASK_DEF=$(echo "$TASK_DEF" | jq \
            --arg IMG "$ECR_REGISTRY/betterdfm-worker:${{ github.sha }}" \
            '.containerDefinitions |= map(if .name == "dfm-worker" then .image = $IMG else . end)')

          # Update gerbonara image if it was rebuilt
          if [ "${{ needs.changes.outputs.gerbonara }}" = "true" ]; then
            TASK_DEF=$(echo "$TASK_DEF" | jq \
              --arg IMG "$ECR_REGISTRY/betterdfm-gerbonara:${{ github.sha }}" \
              '.containerDefinitions |= map(if .name == "gerbonara" then .image = $IMG else . end)')
          fi

          # Remove metadata fields that can't be in a new registration
          echo "$TASK_DEF" | jq 'del(.taskDefinitionArn, .revision, .status, .requiresAttributes, .compatibilities, .registeredAt, .registeredBy)' > /tmp/task-def.json

          NEW_ARN=$(aws ecs register-task-definition --cli-input-json file:///tmp/task-def.json --region $AWS_REGION --query 'taskDefinition.taskDefinitionArn' --output text)
          echo "task_def_arn=$NEW_ARN" >> $GITHUB_OUTPUT

      - name: Deploy worker ECS service
        run: |
          aws ecs update-service \
            --cluster $ECS_CLUSTER \
            --service $ECS_SERVICE \
            --task-definition ${{ steps.task-def.outputs.task_def_arn }} \
            --force-new-deployment \
            --region $AWS_REGION

      - name: Deploy gerbonara ECS service
        if: needs.changes.outputs.gerbonara == 'true'
        run: |
          # Register a new gerbonara task definition with the updated image
          TASK_DEF=$(aws ecs describe-task-definition --task-definition betterdfm-gerbonara --region $AWS_REGION --query 'taskDefinition')
          TASK_DEF=$(echo "$TASK_DEF" | jq \
            --arg IMG "$ECR_REGISTRY/betterdfm-gerbonara:${{ github.sha }}" \
            '.containerDefinitions |= map(if .name == "gerbonara" then .image = $IMG else . end)')
          echo "$TASK_DEF" | jq 'del(.taskDefinitionArn, .revision, .status, .requiresAttributes, .compatibilities, .registeredAt, .registeredBy)' > /tmp/gerbonara-task-def.json
          GERB_ARN=$(aws ecs register-task-definition --cli-input-json file:///tmp/gerbonara-task-def.json --region $AWS_REGION --query 'taskDefinition.taskDefinitionArn' --output text)
          aws ecs update-service \
            --cluster $ECS_CLUSTER \
            --service betterdfm-gerbonara \
            --task-definition "$GERB_ARN" \
            --force-new-deployment \
            --region $AWS_REGION

      - name: Wait for ECS to stabilize
        run: |
          aws ecs wait services-stable \
            --cluster $ECS_CLUSTER \
            --services $ECS_SERVICE \
            --region $AWS_REGION

  deploy-api:
    needs: changes
    if: needs.changes.outputs.api == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push API
        run: |
          docker build \
            -f apps/api/Dockerfile \
            -t $ECR_REGISTRY/betterdfm-api:latest \
            -t $ECR_REGISTRY/betterdfm-api:${{ github.sha }} \
            .
          docker push $ECR_REGISTRY/betterdfm-api:latest
          docker push $ECR_REGISTRY/betterdfm-api:${{ github.sha }}

      - name: Deploy App Runner
        run: |
          aws apprunner start-deployment \
            --service-arn $APPRUNNER_SERVICE_ARN \
            --region $AWS_REGION

      - name: Wait for App Runner deployment
        run: |
          for i in $(seq 1 24); do
            STATUS=$(aws apprunner describe-service \
              --service-arn $APPRUNNER_SERVICE_ARN \
              --region $AWS_REGION \
              --query "Service.Status" --output text)
            echo "App Runner status: $STATUS"
            [ "$STATUS" = "RUNNING" ] && exit 0
            sleep 15
          done
          echo "App Runner did not stabilize in time" && exit 1
